<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' https: data: blob:; script-src 'self' 'unsafe-inline' 'unsafe-eval' https:; style-src 'self' 'unsafe-inline' https:; img-src 'self' data: https:; connect-src 'self' https:;">
    <title>WINGS Scanner App</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400..900&family=Inter:wght@400..700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/appwrite@14.0.1"></script>
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <style>
        /* Mobile specific styles */
        body { 
            min-height: 100vh; 
            display: flex; 
            flex-direction: column; 
            background-color: var(--dark-bg);
        }
        .scanner-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 100px 20px 40px;
            width: 100%;
        }
        #reader {
            width: 100%;
            max-width: 500px;
            border-radius: 12px;
            overflow: hidden;
            background: rgba(0,0,0,0.5);
            margin-bottom: 20px;
            border: 1px solid var(--gold);
        }
        .result-card {
            width: 100%;
            max-width: 500px;
            display: none; /* Hidden by default */
        }
        /* Override html5-qrcode styles to match theme */
        #reader__scan_region { background: transparent; }
        #reader__dashboard_section_csr span, #reader__dashboard_section_swaplink { display: none !important; }
        button { margin-top: 10px; }
    </style>
</head>
<body>
    <!-- Simplified Nav -->
    <nav class="glass-nav">
        <div class="logo">
            <a href="index.html">
                <img src="PYDAH FLAG  (1).png" alt="Pydah Logo" style="height: 60px;" class="nav-logo">
            </a>
        </div>
        <div style="color: var(--gold); font-family: var(--font-heading); font-size: 1.2rem;">SCANNER</div>
    </nav>

    <div class="scanner-container">
        <!-- Camera Viewport -->
        <div id="reader" style="position: relative;"></div>
        <p id="scannerMessage" style="color: #aaa; margin-top: 15px; text-align: center; max-width: 500px; display: none;"></p>
        
        <!-- Result Display -->
        <div id="resultCard" class="glass-card result-card">
            <h3 style="color: var(--gold); margin-bottom: 15px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px;">Participant Details</h3>
            <div id="participantDetails" style="text-align: left; margin-bottom: 20px; color: white;">
                <!-- Details injected here -->
            </div>
            <div style="display: flex; gap: 10px; flex-direction: column;">
                <button id="verifyBtn" onclick="verifyParticipant()" class="btn btn-orange glow-button" style="width: 100%;">Verify Entry</button>
                <button onclick="resetScanner()" class="btn btn-blue glow-button" style="width: 100%;">Scan Next</button>
            </div>
        </div>
    </div>

    <script>
        // Appwrite Config
        const client = new Appwrite.Client();
        client.setEndpoint('https://sgp.cloud.appwrite.io/v1').setProject('69aace7f002dc7981fc6');
        const databases = new Appwrite.Databases(client);
        const DATABASE_ID = '69aacf420003152c50f2';
        const COLLECTION_ID = '69aae492003d1d3dfdba';

        let html5QrCode;
        let currentDocId = null;

        function onScanSuccess(decodedText, decodedResult) {
            // Stop scanning temporarily to show results
            if (html5QrCode) {
                html5QrCode.stop().then(() => {
                    html5QrCode.clear();
                    fetchDetails(decodedText);
                }).catch(err => console.error("Failed to stop scanner", err));
            }
        }

        function onScanFailure(error) {
            // handle scan failure, usually better to ignore and keep scanning.
            console.warn(`QR code scan failed: ${error}`);
        }

        async function fetchDetails(docId) {
            const detailsDiv = document.getElementById('participantDetails');
            const resultCard = document.getElementById('resultCard');
            const verifyBtn = document.getElementById('verifyBtn');
            
            resultCard.style.display = 'block';
            detailsDiv.innerHTML = '<p>Loading details...</p>';
            currentDocId = docId;

            try {
                const doc = await databases.getDocument(DATABASE_ID, COLLECTION_ID, docId);
                
                let eventsDisplay = doc.events;
                try {
                    const parsed = JSON.parse(doc.events);
                    if (Array.isArray(parsed)) eventsDisplay = parsed.map(e => e.replace(/-/g, ' ').toUpperCase()).join(', ');
                } catch (e) {}

                let statusColor = doc.verification_status === 'Verified' ? '#4ade80' : '#facc15';

                detailsDiv.innerHTML = `
                    <p style="margin-bottom: 8px;"><strong>Name:</strong> ${doc.name}</p>
                    <p style="margin-bottom: 8px;"><strong>College:</strong> ${doc.college}</p>
                    <p style="margin-bottom: 8px;"><strong>ID:</strong> <span style="font-family: monospace; color: #aaa;">${doc.$id}</span></p>
                    <p style="margin-bottom: 8px;"><strong>Events:</strong> ${eventsDisplay}</p>
                    <p style="margin-bottom: 8px;"><strong>Payment Ref:</strong> ${doc.paymentReference}</p>
                    <p style="margin-top: 15px; font-size: 1.2rem; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 10px;"><strong>Status:</strong> <span id="statusDisplay" style="color: ${statusColor}; font-weight: bold;">${doc.verification_status}</span></p>
                `;

                if (doc.verification_status === 'Verified') {
                    verifyBtn.textContent = 'Already Verified';
                    verifyBtn.disabled = true;
                    verifyBtn.style.opacity = '0.5';
                } else {
                    verifyBtn.textContent = 'Verify Entry';
                    verifyBtn.disabled = false;
                    verifyBtn.style.opacity = '1';
                }

            } catch (error) {
                console.error(error);
                detailsDiv.innerHTML = '<p style="color: #ef4444;">Error fetching details. Invalid QR or Network Error.</p>';
                verifyBtn.style.display = 'none';
            }
        }

        async function verifyParticipant() {
            if (!currentDocId) return;
            const verifyBtn = document.getElementById('verifyBtn');
            verifyBtn.textContent = 'Verifying...';
            
            try {
                await databases.updateDocument(DATABASE_ID, COLLECTION_ID, currentDocId, {
                    verification_status: 'Verified'
                });
                document.getElementById('statusDisplay').textContent = 'Verified';
                document.getElementById('statusDisplay').style.color = '#4ade80';
                verifyBtn.textContent = 'Verified Successfully';
                verifyBtn.disabled = true;
            } catch (error) {
                alert('Failed to verify: ' + error.message);
                verifyBtn.textContent = 'Verify Entry';
            }
        }

        function resetScanner() {
            document.getElementById('resultCard').style.display = 'none';
            startScanner();
        }

        function startScanner() {
            const scannerMessage = document.getElementById('scannerMessage');
            if (location.protocol !== 'https:' && location.hostname !== 'localhost') {
                scannerMessage.innerText = 'CAMERA ERROR: This app must be run on a secure server (HTTPS) to access the camera.';
                scannerMessage.style.display = 'block';
                scannerMessage.style.color = '#ef4444';
                return;
            }

            html5QrCode = new Html5Qrcode("reader");
            html5QrCode.start(
                { facingMode: "environment" }, 
                { fps: 10, qrbox: {width: 250, height: 250} },
                onScanSuccess,
                onScanFailure
            ).catch(err => {
                console.error("Error starting scanner", err);
                scannerMessage.innerText = `Camera Error: ${err}`;
                scannerMessage.style.display = 'block';
            });
        }

        document.addEventListener('DOMContentLoaded', startScanner);
    </script>
</body>
</html>
